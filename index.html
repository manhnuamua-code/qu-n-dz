<!DOCTYPE html>
<html>
<head>
    <title>QUANDZ - LUXURY DARK MARKET</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background-color: #0d0f12; font-family: 'Segoe UI', sans-serif; transition: 0.6s; overflow: hidden;
        }
        body[data-on="true"] { background-color: #1a1d21; }

        .container { display: flex; align-items: flex-end; gap: 30px; position: relative; }

        /* --- ĐÈN LUXURY --- */
        .lamp-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; }
        .lamp-top {
            width: 130px; height: 65px; background: #f0f0f0; border-radius: 80px 80px 0 0;
            position: relative; z-index: 2; transition: 0.3s;
        }
        body[data-on="true"] .lamp-top { background: #ffdf7e; box-shadow: 0 0 60px 15px rgba(255,223,126,0.6); }
        .lamp-stick { width: 7px; height: 110px; background: #ddd; z-index: 1; }
        .lamp-base { width: 70px; height: 7px; background: #ddd; border-radius: 4px; }
        .pull-chain {
            width: 2px; height: 35px; background: #555; position: absolute;
            left: 70%; top: 65px; cursor: pointer; transition: 0.1s;
        }
        .pull-chain::after { content: ""; width: 7px; height: 7px; background: #8e6d3d; border-radius: 50%; position: absolute; bottom: -7px; left: -3px; }

        /* --- FORM LOGIN MỜ ẢO --- */
        .login-form {
            background: rgba(255, 255, 255, 0.03); padding: 25px; border-radius: 20px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08);
            width: 240px; opacity: 0; transform: scale(0.9); transition: 0.5s; pointer-events: none;
        }
        .login-form.active { opacity: 1; transform: scale(1); pointer-events: auto; }
        h2 { color: white; text-align: center; margin-top: 0; font-weight: 400; }
        input {
            width: 100%; background: rgba(255,255,255,0.07); border: 1px solid #333;
            padding: 10px; border-radius: 8px; color: white; margin-top: 10px; box-sizing: border-box; outline: none;
        }
        .btn-signin {
            width: 100%; margin-top: 20px; padding: 12px; border-radius: 10px; border: none;
            background: linear-gradient(to bottom, #f3d48b, #a58249);
            color: #2b2416; font-weight: bold; cursor: pointer;
        }

        /* --- DARK MARKET (CÓ ẢNH THẬT) --- */
        #darkMarket {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; padding: 15px; box-sizing: border-box; overflow-y: auto;
        }
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .item-card { background: #111; border: 1px solid #222; padding: 10px; border-radius: 12px; text-align: center; }
        .item-img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; filter: brightness(0.7); }
        .price { color: #00ff41; font-weight: bold; display: block; margin: 5px 0; }
        .buy-now { background: #d32f2f; color: white; border: none; padding: 7px; border-radius: 5px; width: 100%; cursor: pointer; }
    </style>
</head>
<body data-on="false">

    <div class="container" id="loginUI">
        <div class="lamp-wrapper">
            <div class="lamp-top"></div>
            <div class="lamp-stick"></div>
            <div class="lamp-base"></div>
            <div class="pull-chain" onclick="toggleLamp()"></div>
        </div>

        <div class="login-form" id="loginForm">
            <h2>Welcome</h2>
            <input type="text" id="user" placeholder="User: Juntramcam">
            <input type="password" id="pass" placeholder="Pass: memaybell">
            <button class="btn-signin" onclick="doLogin()">Sign In</button>
        </div>
    </div>

    <div id="darkMarket">
        <h2 style="color: #ff3b30; text-align: center; letter-spacing: 2px;">QUANDZ MARKET</h2>
        <div class="market-grid">
            <div class="item-card">
                <img src="https://images.unsplash.com/photo-1594061683313-29d1ba7ddd67?w=300" class="item-img">
                <p>Dao Karambit</p><span class="price">0.02 BTC</span><button class="buy-now">BUY</button>
            </div>
            <div class="item-card">
                <img src="https://images.unsplash.com/photo-1595590424283-b8f17842773f?w=300" class="item-img">
                <p>Glock-18</p><span class="price">0.05 BTC</span><button class="buy-now">BUY</button>
            </div>
            <div class="item-card">
                <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=300" class="item-img">
                <p>Hacker Data</p><span class="price">0.01 BTC</span><button class="buy-now">BUY</button>
            </div>
            <div class="item-card">
                <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=300" class="item-img">
                <p>Secret Virus</p><span class="price">0.03 BTC</span><button class="buy-now">BUY</button>
            </div>
        </div>
    </div>

    <script>
        let isOn = false;
        function toggleLamp() {
            isOn = !isOn;
            document.body.setAttribute("data-on", isOn);
            document.getElementById("loginForm").classList.toggle("active", isOn);
        }
        function doLogin() {
            const u = document.getElementById("user").value;
            const p = document.getElementById("pass").value;
            if(u === "Juntramcam" && p === "memaybell") {
                document.getElementById("loginUI").style.display = "none";
                document.getElementById("darkMarket").style.display = "block";
            } else { alert("Sai thông tin rồi!"); }
        }
    </script>
</body>
</html>
