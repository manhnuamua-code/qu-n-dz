<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANDZ - GET KEY SYSTEM</title>
    <style>
        :root { --neon: #00f3ff; --pink: #ff00ff; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', Courier, monospace; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        .container { position: relative; z-index: 2; background: rgba(0, 0, 0, 0.85); border: 2px solid var(--neon); padding: 30px; border-radius: 20px; box-shadow: 0 0 20px var(--neon); text-align: center; max-width: 90%; width: 400px; }
        
        h1 { color: var(--neon); text-shadow: 0 0 10px var(--neon); font-size: 24px; margin-bottom: 5px; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; }

        .key-box { background: #111; border: 1px dashed var(--pink); padding: 20px; border-radius: 12px; margin-bottom: 20px; position: relative; overflow: hidden; }
        .key-box::before { content: "SECURITY KEY"; position: absolute; top: 5px; left: 5px; font-size: 8px; color: var(--pink); opacity: 0.5; }
        
        #display-key { color: #fff; font-size: 22px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 5px #fff; }

        .btn-copy { background: var(--neon); color: #000; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; font-size: 16px; }
        .btn-copy:active { transform: scale(0.95); }

        .footer { margin-top: 20px; font-size: 10px; color: #444; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="container">
        <h1>⚡ QUANDZ SYSTEM ⚡</h1>
        <p>Hệ thống cấp mã Enjector hàng ngày</p>

        <div class="key-box">
            <div id="display-key">ĐANG TẢI...</div>
        </div>

        <button class="btn-copy" onclick="copyKey()">COPY MÃ VIP</button>

        <div class="footer">
            DEVELOPED BY QUANDZ HUB<br>
            KEY RESET SAU 24H
        </div>
    </div>

    <script>
        // --- HIỆU ỨNG MATRIX ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let i = 0; i < columns; i++) drops[i] = 1;

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px arial";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // --- LOGIC ĐỒNG BỘ KEY ---
        const keyList = [];
        for (let i = 1; i <= 200; i++) { keyList.push("quandz-vip-" + i); }

        function getTodayKey() {
            let now = new Date();
            let dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
            return keyList[dayOfYear % 200];
        }

        // Hiển thị key lên màn hình ngay khi load
        const currentKey = getTodayKey();
        document.getElementById('display-key').innerText = currentKey;

        function copyKey() {
            navigator.clipboard.writeText(currentKey);
            alert("Đã copy mã: " + currentKey + "\nQuay lại App và dán vào nhé bro!");
        }
    </script>
</body>
</html>
